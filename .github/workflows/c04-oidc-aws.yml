name: C04 - OIDC + AWS

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  aws-s3-list:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::YOUR_AWS_ACCOUNT_ID:role/GitHubActionsRole
          aws-region: ap-southeast-1

      - name: List S3 buckets
        run: aws s3 ls

      - name: Job summary
        run: |
          echo "## C04 - OIDC + AWS" >> $GITHUB_STEP_SUMMARY
          echo "- **Auth**: OIDC (no static keys)" >> $GITHUB_STEP_SUMMARY
          echo "- **IAM Role**: arn:aws:iam::YOUR_AWS_ACCOUNT_ID:role/GitHubActionsRole" >> $GITHUB_STEP_SUMMARY
          echo "- **Region**: ap-southeast-1" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### IAM Trust Policy cần tạo trên AWS:" >> $GITHUB_STEP_SUMMARY
          echo '```json' >> $GITHUB_STEP_SUMMARY
          echo '{' >> $GITHUB_STEP_SUMMARY
          echo '  "Version": "2012-10-17",' >> $GITHUB_STEP_SUMMARY
          echo '  "Statement": [{' >> $GITHUB_STEP_SUMMARY
          echo '    "Effect": "Allow",' >> $GITHUB_STEP_SUMMARY
          echo '    "Principal": {"Federated": "accounts.google.com"},' >> $GITHUB_STEP_SUMMARY
          echo '    "Action": "sts:AssumeRoleWithWebIdentity",' >> $GITHUB_STEP_SUMMARY
          echo '    "Condition": {' >> $GITHUB_STEP_SUMMARY
          echo '      "StringEquals": {' >> $GITHUB_STEP_SUMMARY
          echo '        "token.actions.githubusercontent.com:sub": "repo:vinh25042005/demo-app:ref:refs/heads/main"' >> $GITHUB_STEP_SUMMARY
          echo '      }' >> $GITHUB_STEP_SUMMARY
          echo '    }' >> $GITHUB_STEP_SUMMARY
          echo '  }]' >> $GITHUB_STEP_SUMMARY
          echo '}' >> $GITHUB_STEP_SUMMARY
