name: deploy

on:
  push:
    branches: [main]
    tags: ['v*.*.*']

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    environment: staging
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Fake deploy
        run: echo " Deployed to staging"

  deploy-production:
    runs-on: ubuntu-latest
    environment: production
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - name: Fake deploy
        run: echo " Deployed to production"