name: reusable-build

on:
  workflow_call:
    inputs:
      image_name:
        required: true
        type: string
      image_tag:
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set short SHA
        run: echo "SHORT_SHA=$(echo ${{ inputs.image_tag }} | cut -c1-7)" >> $GITHUB_ENV
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ inputs.image_name }}:sha-${{ env.SHORT_SHA }}
            ghcr.io/${{ github.repository_owner }}/${{ inputs.image_name }}:${{ inputs.image_tag }}
            ghcr.io/${{ github.repository_owner }}/${{ inputs.image_name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/${{ inputs.image_name }}:sha-${{ env.SHORT_SHA }}
          format: table
          exit-code: 1
          severity: HIGH,CRITICAL
          pkg-types: os
          skip-dirs: /usr/local/lib/node_modules

      - name: Generate SBOM with Syft
        uses: anchore/sbom-action@v0
        with:
          image: ghcr.io/${{ github.repository_owner }}/${{ inputs.image_name }}:sha-${{ env.SHORT_SHA }}
          format: spdx-json
          artifact-name: sbom-demo-app.spdx.json