name: C05 - Dependency Scan

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - run: npm ci
      - run: npm audit --audit-level=high
        continue-on-error: true

      - name: Scan filesystem with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: ${{ github.workspace }}
          format: table
          exit-code: 1
          severity: HIGH,CRITICAL

      - name: Job summary
        if: always()
        run: |
          echo "## C05 - Dependency Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "- **npm ci**: ✅ Dependencies installed from lockfile" >> $GITHUB_STEP_SUMMARY
          echo "- **npm audit**: Scanned for known CVEs" >> $GITHUB_STEP_SUMMARY
          echo "- **Trivy fs**: Filesystem scanned for vulnerabilities" >> $GITHUB_STEP_SUMMARY
